name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install app dependencies
        run: cd app && npm ci

      - name: Lint
        run: cd app && npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  pr-checks:
    runs-on: macos-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          DIFF_LINES=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | awk '{print $4+$6}')
          echo "PR has $DIFF_LINES lines changed"

          if [ "$DIFF_LINES" -gt 500 ]; then
            echo "::error::PR too large ($DIFF_LINES lines). Max 500 lines. Split into smaller PRs."
            exit 1
          fi

          if [ "$DIFF_LINES" -gt 375 ]; then
            echo "::warning::PR approaching size limit ($DIFF_LINES/500 lines)"
          fi

      - name: Validate conventional commits
        run: |
          npm ci
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD
