      #         "inputs": {
      #           "PR_NUMBER": "${{ github.event.pull_request.number }}",
      #           "REPO": "${{ github.repository }}",
      #           "BASE_REF": "${{ github.base_ref }}"
      #         }
      #       }' || echo "Overthink not available (local-only)"
