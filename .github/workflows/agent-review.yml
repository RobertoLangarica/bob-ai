name: Agent Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  agent-review:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run automated code review
        run: bash scripts/review-pr.sh ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ github.token }}

      # Optional: Trigger overthink locally via webhook
      # Uncomment when overthink is set up with a webhook listener
