name: PR Screenshots

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'app/src/**'

jobs:
  generate-screenshots:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app && npm ci
          npm install -g puppeteer

      - name: Build app
        run: cd app && npm run build-only

      - name: Start preview server
        run: |
          cd app && npm run preview &
          sleep 5

      - name: Generate screenshots
        run: node scripts/capture-screenshots.js ${{ github.event.pull_request.number }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots-${{ github.event.pull_request.number }}
          path: screenshots/pr-${{ github.event.pull_request.number }}/

      - name: Comment on PR with screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'screenshots/report.md';

            if (!fs.existsSync(reportPath)) {
              console.log('No screenshot report generated');
              return;
            }

            const report = fs.readFileSync(reportPath, 'utf8');

            // Delete previous bot screenshot comments
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            for (const comment of comments.data) {
              if (comment.body.includes('📸 UI Screenshots')) {
                await github.rest.issues.deleteComment({
                  comment_id: comment.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report,
            });
